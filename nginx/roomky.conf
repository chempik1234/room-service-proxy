# HTTPS server for HTTP API (port 443)
server {
    listen 443 ssl http2;
    server_name roomky.chickenkiller.com;

    # SSL certificate configuration
    ssl_certificate /etc/ssl/certs/roomky-cert.pem;
    ssl_certificate_key /etc/ssl/private/roomky-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Proxy HTTP API requests to local proxy microservice
    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# gRPC server for tenant connections (port 50052)
server {
    listen 50052 ssl http2;
    server_name roomky.chickenkiller.com;

    # SSL certificate configuration
    ssl_certificate /etc/ssl/certs/roomky-cert.pem;
    ssl_certificate_key /etc/ssl/private/roomky-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # gRPC proxy to local proxy microservice (container port 50051)
    location / {
        grpc_pass grpc://localhost:50051;
        grpc_set_header Host $host;
        grpc_set_header X-Real-IP $remote_addr;
        grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        grpc_set_header X-Forwarded-Proto $scheme;
    }
}
