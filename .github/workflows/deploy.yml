name: Deploy to Yandex Cloud via Taskfile

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to Yandex Cloud VM
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.YANDEX_HOST }}
        username: ${{ secrets.YANDEX_USER }}
        key: ${{ secrets.YANDEX_SSH_KEY }}
        script: |
          # Create working directory if it doesn't exist
          mkdir -p ~/roomservice
          cd ~/roomservice

          # Install Task if not already installed
          if ! command -v task &> /dev/null; then
            echo "Installing Task..."
            sudo sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
          fi

          # Clone or update repository
          if [ -d ".git" ]; then
            echo "Updating existing repository..."
            git pull
          else
            echo "Cloning repository..."
            rm -rf *
            git clone https://github.com/${{ github.repository }}.git tmp
            mv tmp/* tmp/.gitignore .
            rm -rf tmp
          fi

          # Setup environment from host variables
          echo "Setting up environment..."
          cat > .env << EOF
          DATABASE_URL=${DATABASE_URL}
          GRPC_PORT=${GRPC_PORT:-50051}
          RATE_LIMIT_RPS=${RATE_LIMIT_RPS:-100}
          RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60s}
          RATE_LIMIT_BURST=${RATE_LIMIT_BURST:-10}
          ADMIN_PORT=${ADMIN_PORT:-8080}
          ADMIN_API_KEY=${ADMIN_API_KEY}
          ENABLE_AUTH=${ENABLE_AUTH:-true}
          ENABLE_RATE_LIMIT=${ENABLE_RATE_LIMIT:-true}
          DEPLOYMENT_PROVIDER=${DEPLOYMENT_PROVIDER:-yandex}
          YANDEX_FOLDER_ID=${YANDEX_FOLDER_ID}
          YANDEX_ZONE=${YANDEX_ZONE}
          POSTGRES_DB=${POSTGRES_DB:-room_service_proxy}
          POSTGRES_USER=${POSTGRES_USER:-room_service_proxy}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          EOF

          # Stop existing services
          echo "Stopping existing services..."
          docker-compose down || true

          # Rebuild and start services using Task
          echo "Building and deploying services..."
          task rebuild

          # Wait for services to be healthy
          echo "Waiting for services to be healthy..."
          sleep 10

          # Check service health
          echo "Checking service health..."
          curl -f http://localhost:8080/health || exit 1

          echo "✅ Deployment successful!"

    - name: Notify on success
      if: success()
      run: echo "✅ Deployment successful!"

    - name: Notify on failure
      if: failure()
      run: echo "❌ Deployment failed!"