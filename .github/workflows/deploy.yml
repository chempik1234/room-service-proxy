name: Deploy to Yandex Cloud via Taskfile

on:
  push:
    branches: [ master ]
  workflow_dispatch:  # Allows manual trigger from Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: roomservice-yandex

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to Yandex Cloud VM
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.YANDEX_HOST }}
        username: ${{ secrets.YANDEX_USER }}
        key: ${{ secrets.YANDEX_SSH_KEY }}
        script: |
          # Create working directory if it doesn't exist
          mkdir -p ~/roomservice
          cd ~/roomservice

          # Install Task if not already installed
          if ! command -v task &> /dev/null; then
            echo "Installing Task..."
            sudo sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
          fi

          # Clone or update repository
          if [ -d ".git" ]; then
            echo "Updating existing repository..."
            git pull
          else
            echo "Cloning repository..."
            rm -rf *
            git clone https://github.com/${{ github.repository }}.git tmp
            mv tmp/* tmp/.gitignore .
            rm -rf tmp
          fi

          # Delete any existing .env file to ensure single source of truth
          echo "Removing any existing .env file..."
          rm -f .env

          # Setup environment from GitHub environment
          echo "Setting up environment from roomservice-yandex environment..."
          cat > .env << EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          GRPC_PORT=${{ vars.GRPC_PORT }}
          RATE_LIMIT_RPS=${{ vars.RATE_LIMIT_RPS }}
          RATE_LIMIT_WINDOW=${{ vars.RATE_LIMIT_WINDOW }}
          RATE_LIMIT_BURST=${{ vars.RATE_LIMIT_BURST }}
          ADMIN_PORT=${{ vars.ADMIN_PORT }}
          ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }}
          ENABLE_AUTH=${{ vars.ENABLE_AUTH }}
          ENABLE_RATE_LIMIT=${{ vars.ENABLE_RATE_LIMIT }}
          DEPLOYMENT_PROVIDER=${{ vars.DEPLOYMENT_PROVIDER }}
          YANDEX_FOLDER_ID=${{ secrets.YANDEX_FOLDER_ID }}
          YANDEX_ZONE=${{ secrets.YANDEX_ZONE }}
          YANDEX_SUBNET_ID=${{ secrets.YANDEX_SUBNET_ID }}
          YANDEX_SERVICE_ACCOUNT_KEY=/app/keys/yandex-service-account-key.json
          YANDEX_SSH_KEY_PATH=/app/keys/yandex_provisioning_key
          POSTGRES_DB=${{ vars.POSTGRES_DB }}
          POSTGRES_USER=${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          EOF

          # Create keys directory and upload key files
          echo "Setting up key files..."
          mkdir -p keys

          # Upload service account key using base64 to preserve formatting
          echo '${{ secrets.YANDEX_SERVICE_ACCOUNT_KEY }}' | base64 -d > keys/yandex-service-account-key.json || echo '${{ secrets.YANDEX_SERVICE_ACCOUNT_KEY }}' > keys/yandex-service-account-key.json

          # Upload SSH keys
          echo '${{ secrets.YANDEX_PROVISIONING_SSH_KEY }}' > keys/yandex_provisioning_key
          echo '${{ secrets.YANDEX_PROVISIONING_SSH_KEY_PUB }}' > keys/yandex_provisioning_key.pub

          # Set proper permissions
          chmod 600 keys/yandex-service-account-key.json
          chmod 600 keys/yandex_provisioning_key
          chmod 644 keys/yandex_provisioning_key.pub

          # Verify JSON file is valid - show first 200 chars
          echo "Verifying service account key JSON..."
          echo "File content (first 200 chars):"
          head -c 200 keys/yandex-service-account-key.json
          echo ""

          # Stop existing services
          echo "Stopping existing services..."
          docker compose down || true

          # Rebuild and start services using Task
          echo "Building and deploying services..."
          task rebuild

          # Wait for services to be healthy
          echo "Waiting for services to be healthy..."
          sleep 10

          # Check service health
          echo "Checking service health..."
          curl -f http://localhost:8080/health || exit 1

          echo "✅ Deployment successful!"

    - name: Notify on success
      if: success()
      run: echo "✅ Deployment successful!"

    - name: Notify on failure
      if: failure()
      run: echo "❌ Deployment failed!"