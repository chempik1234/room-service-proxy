# Railway.toml - RoomService Proxy Configuration

[project]
name = "roomservice-proxy"

# Build configuration
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# Main proxy service (runs both gRPC and HTTP servers)
[[services]]
name = "proxy"
protocol = "TCP"

# Environment variables
[services.config]
DATABASE_URL = "${{Postgres.DATABASE_URL}}"
ADMIN_API_KEY = "${{ADMIN_API_KEY}}"
GRPC_PORT = "50051"
ADMIN_PORT = "8080"
RATE_LIMIT_RPS = "100"
RATE_LIMIT_WINDOW = "60s"
RATE_LIMIT_BURST = "10"
ENABLE_AUTH = "true"
ENABLE_RATE_LIMIT = "true"
RAILWAY_TOKEN = "2f0c6a19-3aac-4c23-a936-6f92f14a315b"
RAILWAY_PROJECT_ID = "224e8e6a-302e-4d5e-bc00-b377c8c677e3"

# gRPC Port Configuration (Public TCP - for gRPC clients)
[[services.ports]]
port = 50051
type = "TCP"
name = "grpc"
public = true  # Expose publicly

# HTTP Port Configuration (Public HTTP - for Admin API & Control Panel)
[[services.ports]]
port = 8080
type = "HTTP"
name = "http"
public = true  # Expose publicly

# Health check (uses HTTP endpoint)
[[services.health_checks]]
path = "/health"
method = "GET"
target_port = 8080
interval = "60s"
timeout = "10s"
retries = 3
start_period = "120s"

# PostgreSQL service
[[services]]
name = "postgres"
image = "postgres:16-alpine"

[services.config]
POSTGRES_USER = "postgres"
POSTGRES_DB = "roomservice_proxy"
POSTGRES_PASSWORD = "${{Postgres.POSTGRES_PASSWORD}}"

[[services.ports]]
port = 5432
type = "TCP"

# Volumes for data persistence
[[services.volumes]]
name = "data"
mount_to = "/var/lib/postgresql/data"
