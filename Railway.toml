# Railway.toml - RoomService Proxy Configuration (Fixed)

[project]
name = "roomservice-proxy"

# Build configuration
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# Main proxy service
[[services]]
name = "proxy"

# Environment variables
[services.config]
DATABASE_URL = "${{Postgres.DATABASE_URL}}"
ADMIN_API_KEY = "${{ADMIN_API_KEY}}"
GRPC_PORT = "50051"
ADMIN_PORT = "8080"
RATE_LIMIT_RPS = "100"
RATE_LIMIT_WINDOW = "60s"
RATE_LIMIT_BURST = "10"
ENABLE_AUTH = "true"
ENABLE_RATE_LIMIT = "true"

# Port configuration
[[services.ports]]
port = 50051
type = "TCP"
name = "grpc"

[[services.ports]]
port = 8080
type = "HTTP"
name = "http"

# Health check (FIXED)
[[services.health_checks]]
path = "/health"
method = "GET"
target_port = 8080
interval = "60s"        # Check every 60 seconds
timeout = "10s"        # Give it 10 seconds
retries = 3
start_period = "120s"  # Give service 2 minutes to start up

# HTTP health check (more reliable)
[[services.health_checks]]
command = "curl -f http://localhost:8080/health || exit 1"
interval = "60s"
timeout = "10s"
retries = 3
start_period = "120s"

# PostgreSQL service
[[services]]
name = "postgres"
image = "postgres:16-alpine"

[services.config]
POSTGRES_USER = "postgres"
POSTGRES_DB = "roomservice_proxy"
POSTGRES_PASSWORD = "${{Postgres.POSTGRES_PASSWORD}}"

[[services.ports]]
port = 5432
type = "TCP"

# Volumes for data persistence
[[services.volumes]]
name = "data"
mount_to = "/var/lib/postgresql/data"
